<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOICE AI - Pro Studio</title>
    
    <!-- Meta tag agar halaman ini TIDAK terbaca oleh Google Search (Private) -->
    <meta name="robots" content="noindex, nofollow">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    animation: { 'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both', 'fadeIn': 'fadeIn 0.5s ease-out forwards', },
                    keyframes: {
                        shake: { '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' }, '20%, 80%': { transform: 'translate3d(2px, 0, 0)' }, '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' }, '40%, 60%': { transform: 'translate3d(4px, 0, 0)' } },
                        fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-green-400/10 min-h-screen flex items-center justify-center p-4 text-black antialiased">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="w-full max-w-sm bg-white/80 backdrop-blur-xl border border-white/50 rounded-2xl shadow-xl p-8 flex flex-col items-center gap-6 relative z-50">
        <div class="text-center">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 border-2 border-green-200">
                <i class="fas fa-shield-alt text-2xl text-green-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Portal Akses</h1>
            <p class="text-xs font-medium text-gray-500 mt-2">Eksklusif untuk <strong class="text-green-600">MEMBER TERDAFTAR</strong></p>
        </div>
        <div class="w-full space-y-4">
            <input type="password" id="pinInput" placeholder="Masukkan PIN..." class="w-full text-center tracking-[0.5em] font-mono text-xl p-4 rounded-xl bg-white border-2 border-gray-200 focus:outline-none focus:border-green-500 shadow-sm">
            <p id="loginError" class="text-xs text-red-500 font-bold text-center h-4 hidden">PIN salah!</p>
            <button id="loginBtn" class="w-full py-3.5 rounded-xl bg-green-600 hover:bg-green-700 text-white font-bold shadow-md transition-all active:scale-95">
                Buka Aplikasi <i class="fas fa-arrow-right ml-1"></i>
            </button>
        </div>
    </div>

    <!-- APP SCREEN -->
    <main id="appScreen" class="hidden w-full max-w-md bg-white/60 backdrop-blur-xl border border-white/50 rounded-2xl shadow-xl p-6 flex-col gap-6 relative opacity-0">
        <!-- Pengaturan API & Keluar -->
        <div class="absolute right-6 top-6 flex gap-2 z-20">
            <button id="apiSettingsBtn" class="text-[10px] font-bold text-gray-600 bg-white px-2 py-1 rounded-md shadow border border-gray-200"><i class="fas fa-cog"></i> API</button>
            <button id="logoutBtn" class="text-[10px] font-bold text-red-500 bg-white px-2 py-1 rounded-md shadow border border-red-100"><i class="fas fa-lock"></i> Keluar</button>
        </div>
        
        <header class="text-center relative z-10 mt-4">
            <h1 class="text-3xl font-bold text-black tracking-tight">VOICE AI <span class="text-green-600">PRO</span></h1>
            <div class="inline-block mt-2 bg-green-100 border border-green-200 px-3 py-1 rounded-full">
                <p class="text-[9px] font-bold tracking-[0.1em] text-green-800 uppercase">Lisensi: <span id="displayUserNameHeader">MEMBER</span></p>
            </div>
        </header>

        <div class="space-y-4 relative z-10 mt-2">
            <!-- Karakter Spesifik -->
            <div>
                <label class="block text-xs font-semibold mb-1 uppercase">Karakter AI</label>
                <select id="voiceSelect" class="w-full p-3 rounded-xl bg-white border border-gray-300 text-sm shadow-sm outline-none focus:border-green-500">
                    <option value="leda">Leda (Wanita - Elegan)</option>
                    <option value="aoede" selected>Aoede (Wanita - Ceria)</option>
                    <option value="fenrir">Fenrir (Pria - Naratif)</option>
                    <option value="iapetus">Iapetus (Pria - Santai)</option>
                    <option value="puck">Puck (Anak Laki-laki)</option>
                </select>
            </div>

            <!-- Gaya & Ekspresi -->
            <div>
                <label class="block text-xs font-semibold mb-1 uppercase">Gaya Bicara</label>
                <select id="styleInput" class="w-full p-3 rounded-xl bg-white border border-gray-300 text-sm shadow-sm outline-none focus:border-green-500">
                    <option value="">Netral (Standar)</option>
                    <option value="a Javanese medhok accent">Aksen Jawa Medhok</option>
                    <option value="a Sundanese accent">Aksen Sunda</option>
                    <option value="a happy and cheerful tone">Gembira / Antusias</option>
                    <option value="a firm and authoritative tone">Tegas / Berwibawa</option>
                </select>
            </div>

            <!-- Teks Input -->
            <div>
                <label class="block text-xs font-semibold mb-1 uppercase">Naskah Anda</label>
                <textarea id="scriptText" rows="4" placeholder="Ketik materi atau dialog di sini..." class="w-full p-3 rounded-xl bg-white border border-gray-300 text-sm shadow-sm outline-none focus:border-green-500 resize-none"></textarea>
                <p id="statusText" class="text-[11px] text-gray-500 mt-1"></p>
            </div>
            
            <!-- Tombol -->
            <button id="generateBtn" class="w-full py-3.5 rounded-xl bg-green-500 hover:bg-green-600 text-black font-bold shadow-lg transition-all active:scale-95">
                <i class="fas fa-volume-up"></i> Generate Suara
            </button>
            
            <button id="saveBtn" disabled class="hidden w-full py-3 rounded-xl bg-white text-black font-bold border border-green-200 shadow-sm hover:bg-green-50 transition-all flex items-center justify-center gap-2">
                <i class="fas fa-download"></i> Simpan MP3
            </button>

            <!-- Audio Player -->
            <div id="playerSection" class="hidden mt-2 p-2 bg-white rounded-xl shadow border border-gray-100">
                <audio id="audioPlayer" controls class="w-full h-10"></audio>
            </div>
        </div>
    </main>

    <!-- MODAL API KEY -->
    <div id="apiModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold"><i class="fas fa-key text-green-500 mr-2"></i>Kunci API Gemini</h3>
                <button id="closeApiModal" class="text-gray-400 hover:text-red-500"><i class="fas fa-times"></i></button>
            </div>
            <p class="text-xs text-gray-600 mb-4">Tempelkan API Key Anda agar aplikasi bisa bersuara.</p>
            <input type="password" id="apiKeyInput" placeholder="AIzaSy..." class="w-full p-3 rounded-xl bg-gray-50 border border-gray-300 text-sm focus:border-green-500 mb-4">
            <button id="saveApiBtn" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl">Simpan Kunci</button>
        </div>
    </div>

    <!-- FOOTER COPYRIGHT -->
    <div class="absolute bottom-4 w-full text-center z-10">
        <p class="text-[11px] font-medium text-gray-500 tracking-wider">&copy; Dody HS 2026</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // 1. DATA PENGGUNA (TAMBAHKAN PIN DI SINI)
            const VALID_USERS = {
                'MTIzNDU2': 'GURU DEMO (TRIAL)', // PIN Asli: 123456
                'MjAyNg==': 'MEMBER VIP 1'       // PIN Asli: 2026
            };
            
            const loginScreen = document.getElementById('loginScreen');
            const appScreen = document.getElementById('appScreen');
            const pinInput = document.getElementById('pinInput');

            if (sessionStorage.getItem('isLoggedIn') === 'true') showApp();

            function validatePin() {
                const inputBase64 = btoa(pinInput.value);
                if (VALID_USERS[inputBase64]) {
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('userName', VALID_USERS[inputBase64]);
                    loginScreen.classList.add('hidden');
                    showApp();
                } else {
                    document.getElementById('loginError').classList.remove('hidden');
                    pinInput.classList.add('border-red-500');
                    pinInput.value = '';
                }
            }

            function showApp() {
                document.getElementById('displayUserNameHeader').textContent = sessionStorage.getItem('userName');
                appScreen.classList.remove('hidden');
                setTimeout(() => appScreen.classList.add('animate-fadeIn'), 50);
            }

            document.getElementById('loginBtn').addEventListener('click', validatePin);
            document.getElementById('logoutBtn').addEventListener('click', () => {
                sessionStorage.clear();
                window.location.reload();
            });

            // 2. MODAL API
            let storedApiKey = localStorage.getItem('userGeminiApiKey') || "";
            const apiModal = document.getElementById('apiModal');
            
            document.getElementById('apiSettingsBtn').onclick = () => {
                document.getElementById('apiKeyInput').value = storedApiKey;
                apiModal.classList.remove('hidden');
            };
            document.getElementById('closeApiModal').onclick = () => apiModal.classList.add('hidden');
            document.getElementById('saveApiBtn').onclick = () => {
                const newKey = document.getElementById('apiKeyInput').value.trim();
                if(newKey) {
                    localStorage.setItem('userGeminiApiKey', newKey);
                    storedApiKey = newKey;
                    apiModal.classList.add('hidden');
                    alert("API Key Berhasil Disimpan!");
                }
            };

            // 3. GENERATE AUDIO LAMEJS
            function pcmToMp3(pcmData, sampleRate) {
                const samples = new Int16Array(pcmData);
                const mp3encoder = new lamejs.Mp3Encoder(1, sampleRate, 128);
                const mp3Data = [];
                for (let i = 0; i < samples.length; i += 1152) {
                    const chunk = samples.subarray(i, i + 1152);
                    const mp3buf = mp3encoder.encodeBuffer(chunk);
                    if (mp3buf.length > 0) mp3Data.push(mp3buf);
                }
                const flush = mp3encoder.flush();
                if (flush.length > 0) mp3Data.push(flush);
                return new Blob(mp3Data, { type: 'audio/mp3' });
            }

            const generateBtn = document.getElementById('generateBtn');
            generateBtn.addEventListener('click', async () => {
                const textValue = document.getElementById('scriptText').value.trim();
                const status = document.getElementById('statusText');
                
                if(!textValue) return alert("Silakan ketik naskah terlebih dahulu.");
                if(!storedApiKey) return alert("API Key belum dimasukkan! Klik ikon ⚙️ API di pojok kanan atas.");

                generateBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mensintesis...';
                status.textContent = "Menghubungi AI...";
                
                try {
                    const voice = document.getElementById('voiceSelect').value;
                    const style = document.getElementById('styleInput').value;
                    const promptText = style ? `Say with ${style}: ${textValue}` : textValue;
                    
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${storedApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: promptText }] }],
                            generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice.charAt(0).toUpperCase() + voice.slice(1) } } } }
                        })
                    });

                    if(!response.ok) throw new Error("API Key salah atau kuota habis.");
                    
                    const data = await response.json();
                    const b64 = data.candidates[0].content.parts[0].inlineData.data;
                    const binary = atob(b64);
                    const pcmBytes = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) pcmBytes[i] = binary.charCodeAt(i);

                    const blob = pcmToMp3(pcmBytes.buffer, 24000);
                    const url = URL.createObjectURL(blob);
                    
                    document.getElementById('audioPlayer').src = url;
                    document.getElementById('playerSection').classList.remove('hidden');
                    
                    const saveBtn = document.getElementById('saveBtn');
                    saveBtn.classList.remove('hidden');
                    saveBtn.disabled = false;
                    saveBtn.onclick = () => {
                        const a = document.createElement('a');
                        a.href = url; a.download = 'Audio_AI.mp3'; a.click();
                    };
                    status.textContent = "Berhasil!";
                } catch (e) {
                    alert("Error: " + e.message);
                    status.textContent = "Gagal memproses audio.";
                } finally {
                    generateBtn.innerHTML = '<i class="fas fa-volume-up"></i> Generate Suara';
                }
            });
        });
    </script>
</body>
</html>
